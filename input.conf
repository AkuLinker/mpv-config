###########
# General #
###########

# Close window
q                     quit
й                     quit
# Toggle fullscreen mode with "f", russian "а" and middle button of mouse
f                     cycle fullscreen
а                     cycle fullscreen
MBTN_MID              cycle fullscreen
# Toggle uosc interface visibility
TAB                   script-binding uosc/toggle-ui
# Toggle uosc context menu
MBTN_RIGHT            script-binding uosc/menu
p                     script-binding uosc/menu
з                     script-binding uosc/menu

# Console
`                     script-binding console/enable
ё                     script-binding console/enable

# Ignore left mouse button
MBTN_LEFT             ignore


#####################
# Playback controls #
#####################

# Pause
SPACE                 cycle pause
PLAY                  cycle pause
PAUSE                 cycle pause
PLAYPAUSE             cycle pause
# Pause/Play on mouse left button double click
MBTN_LEFT_DBL         cycle pause

# Seek time to 1 seconds
RIGHT                 script-binding seek-small-forward; script-binding uosc/flash-timeline
LEFT                  script-binding seek-small-backward; script-binding uosc/flash-timeline
# Seek time to 5 seconds
Ctrl+RIGHT            script-binding seek-medium-forward; script-binding uosc/flash-timeline
Ctrl+LEFT             script-binding seek-medium-backward; script-binding uosc/flash-timeline
# Seek time to 10 seconds
Shift+RIGHT           script-binding seek-large-forward; script-binding uosc/flash-timeline
Shift+LEFT            script-binding seek-large-backward; script-binding uosc/flash-timeline
# Seek time to 30 seconds
Shift+Ctrl+RIGHT      script-binding seek-huge-forward; script-binding uosc/flash-timeline
Shift+Ctrl+LEFT       script-binding seek-huge-backward; script-binding uosc/flash-timeline
# Seek to start of video
0                     seek 0 absolute-percent; show-text "⏮ Start" 3000; script-binding uosc/flash-timeline
# Chapter navigation
PGUP                  no-osd add chapter 1; show-text "⏩ Chapter: ${chapter}" 3000; script-binding uosc/flash-timeline
PGDWN                 no-osd add chapter -1; show-text "⏪ Chapter: ${chapter}" 3000; script-binding uosc/flash-timeline

# Skip to the previous file
<                     playlist-prev
Б                     playlist-prev
PREV                  playlist-prev
# Skip to the next file
>                     playlist-next
Ю                     playlist-next
NEXT                  playlist-next

# Set/clear A-B loop points
l                     ab-loop
д                     ab-loop

# Seek between subtitles
k  sub-seek  1; show-text "⏭ next subtitle" 3000
л  sub-seek  1; show-text "⏭ next subtitle" 3000
j  sub-seek -1; show-text "⏮ prev subtitle" 3000
о  sub-seek -1; show-text "⏮ prev subtitle" 3000

# Fast forwading between subs
ctrl+j script-binding sub_transition_toggle_fast_forward
ctrl+о script-binding sub_transition_toggle_fast_forward
# Skiping between subs
ctrl+k script-binding sub_transition_skip_immediately
ctrl+л script-binding sub_transition_skip_immediately
# Menu for fast forwading and skiping between subs
h script-binding sub_transition_menu_open
р script-binding sub_transition_menu_open


##########
# Volume #
##########

UP                    no-osd add volume  2 ; script-message-to uosc flash-elements volume
DOWN                  no-osd add volume -2 ; script-message-to uosc flash-elements volume
WHEEL_UP              no-osd add volume  1 ; script-message-to uosc flash-elements volume
WHEEL_DOWN            no-osd add volume -1 ; script-message-to uosc flash-elements volume
VOLUME_UP             no-osd add volume  2 ; script-message-to uosc flash-elements volume
VOLUME_DOWN           no-osd add volume -2 ; script-message-to uosc flash-elements volume

# Mute
m                     cycle mute
ь                     cycle mute
MUTE                  cycle mute


###########
# Tracks  #
###########

# Audio track selection (uosc)
a                     script-binding uosc/audio
ф                     script-binding uosc/audio


##############
# Subtitles  #
##############

# Subtitles selection (uosc)
s                     script-binding uosc/subtitles
ы                     script-binding uosc/subtitles
# Adjust subtitle delay by 0.1s
z                     add sub-delay -0.1
я                     add sub-delay -0.1
x                     add sub-delay +0.1
ч                     add sub-delay +0.1
# Reset subtitle delay
c                     set sub-delay 0
с                     set sub-delay 0
# Hide/show subtitles
v                     cycle sub-visibility
м                     cycle sub-visibility

# Toggle overriding SSA/ASS subtitle styles with the normal styles
u                     cycle-values sub-ass-override "force" "scale"
г                     cycle-values sub-ass-override "force" "scale"
# Toggle subtitle background
y                     cycle-values sub-border-style "background-box" "outline-and-shadow"
н                     cycle-values sub-border-style "background-box" "outline-and-shadow"

# Translate subtitle in google (google-translate.lua)
t                     script-binding open-google-translate
е                     script-binding open-google-translate

# Search subtitle with uosc interface (sub-search.lua)
ctrl+f                script-binding sub-search-open
ctrl+а                script-binding sub-search-open


##############
# OSD / Info #
##############

# Toggle playback progress (time, duration, %)
o                     no-osd cycle-values osd-level 3 1
щ                     no-osd cycle-values osd-level 3 1

# Show time of video and when it will end
r                     script-binding time/show-end-time
к                     script-binding time/show-end-time
# Show the playlist
]                     script-binding uosc/playlist
ъ                     script-binding uosc/playlist
# Show the chapters
[                     script-binding uosc/chapters
х                     script-binding uosc/chapters
# Toggle displaying key bindings
?                     script-binding stats/display-page-4-toggle
# Toggle displaying information and statistics
i                     script-binding stats/display-stats-toggle
ш                     script-binding stats/display-stats-toggle

# Zoom
Ctrl+WHEEL_UP         script-binding positioning/cursor-centric-zoom  0.1
Ctrl+WHEEL_DOWN       script-binding positioning/cursor-centric-zoom -0.1
Ctrl+MBTN_MID         set video-zoom 0; no-osd set video-pan-x 0; no-osd set video-pan-y 0


###############
# Screenshots #
###############

# Screenshot (Shift + S)
S                     screenshot
Ы                     screenshot
# Screenshot without subtitles
Alt+s                 screenshot video
Alt+ы                 screenshot video


