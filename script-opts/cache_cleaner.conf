# cache_cleaner.conf
# Configuration for cache_cleaner.lua
# Location: ~/.config/mpv/script-opts/cache_cleaner.conf

# Maximum age of watch-later files in days (0 = disabled)
watch_later_days=60

# Maximum age of shader cache files in days (0 = disabled)
shaders_cache_days=60

# Minimum interval between cleanup runs in hours
check_interval_hours=24

# Path to the watch_later folder, relative to the mpv config directory
watch_later_dir=cache/watch_later

# Path to the shader cache folder, relative to the mpv config directory
shaders_cache_dir=cache/shaders_cache

# Marker file that records the time of the last run
last_run_file=cache/cache_cleaner_last_run

# Enable detailed logging to mpv log and write a per-session log file (yes/no)
# When no: only a brief summary (if anything was deleted) goes to the mpv log
verbose=yes

# Folder for per-session log files, relative to the mpv config directory
log_dir=cache/cache_cleaner_logs

# How many days to keep log files (0 = keep forever)
log_keep_days=30
