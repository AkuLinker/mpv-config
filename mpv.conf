#########
# Video #
#########

# vo=gpu-next — the "next-generation" rendering engine in mpv
vo=gpu-next
# Vulkan Linux, Windows (preferred)
gpu-api=vulkan
gpu-context=auto
# Hardware decoding (HWDEC) (saves CPU, enables Direct Rendering)
vd-lavc-dr=yes
hwdec=auto-safe
# Enable temporal dithering (must be set explicitly on Linux) (tricks the eye into smoother gradients)
temporal-dither=yes


##########
# Player #
##########

# Disable default key bindings
no-input-default-bindings
# Time before cursor disappear
cursor-autohide=3000
#
osd-font=Inter
# Enable IPC socket for communication with external programs
input-ipc-server=/tmp/mpvsock
# Save position, volume, audio track and subtitles on exit
save-position-on-quit=yes
watch-later-options=start,volume,mute,aid,sid,secondary-sid,sub-delay
# Keep the player open after playback ends
keep-open=yes
# Limit window size on startup (no larger than this percentage of the screen)
autofit-larger=85%x85%
# Keep cache files organized
watch-later-dir="~~/cache/watch_later"
gpu-shader-cache-dir="~~/cache/shaders_cache"


########
# Subs #
########

# Subtitle language priority
slang=eng,en,en-US,rus,ru
# Paths to search for subtitle files (comma or colon for separation)
sub-file-paths=sub:subs:Sub:Subs:subtitles:Subtitles
# Load subtitles with a similar but not exactly matching filename
sub-auto=fuzzy

# Serrings for plain-text subtitles only (SRT, VTT, SUB).
# Font family name to use for subtitles
sub-font=Roboto
# Font size in abstract mpv units (46 is comfortable for 1080p, raise to ~65 for 4K)
sub-font-size=40
# Render the font in bold weight
sub-bold=no
# Subtitle text color in RRGGBBAA hex (last two digits = opacity, FF = fully opaque)
sub-color="#FFFFFF"
# Color of the text border/outline in RRGGBBAA
sub-border-color="#FF000000"
# Thickness of the text outline in pixels (2.0–3.0 is a good range)
sub-border-size=2.3
# Drop shadow offset in pixels (0 = disabled)
sub-shadow-offset=0
# Drop shadow color in RRGGBBAA (set fully transparent when shadow is disabled)
sub-shadow-color="#A0000000"
# Bottom (or top) margin from the screen edge in pixels
sub-margin-y=36
# Horizontal margin; also affects line-wrap width
sub-margin-x=72
# Horizontal alignment of subtitle text: left / center / right
sub-align-x=center
# Vertical alignment: top / center / bottom
sub-align-y=bottom
# Override ASS/SSA styling: no = leave ASS files untouched, apply settings only to plain-text formats
sub-ass-override=no


#########
# Audio #
#########

# Set a specific volume level on first launch
volume=100
# Allow volume to be raised up to 150% (instead of the default 130%)
volume-max=150


###############
# Screenshots #
###############

# Path to the screenshots folder
screenshot-directory="~/Pictures/MPV screenshots"
# Filename template: Title - Timestamp - Date
screenshot-template="%F - [%wh. %wM. %wS] (%td.%tm.%tY %tH.%tM.%tS)"
# Format (png for better quality, jpg for smaller file size)
screenshot-format=png


##################
# uosc UI plugin #
##################

# uosc provides seeking & volume indicators (via flash-timeline and flash-volume commands)
# if you decide to use them, you don't need osd-bar
osd-bar=no
# uosc will draw its own window controls and border if you disable window border
# border=no


############
# Profiles #
############

# Profile for a specific anime folder
[anime-folder]
profile-cond=string.match(path, "/home/akulinker/AllMedia/Anime/") ~= nil
alang=jpn,jp,eng,en,rus,ru

# Profile for other media collections
[movies-folder]
profile-cond=string.match(path, "/home/akulinker/AllMedia/Films/") ~= nil or string.match(path, "/home/akulinker/AllMedia/Serials/") ~= nil
alang=eng,en,en-US,jpn,jp,rus,ru


#################
# Music profile #
#################

[extension.mp3]
profile=music-mode
[extension.flac]
profile=music-mode
[extension.ogg]
profile=music-mode
[extension.opus]
profile=music-mode
[extension.m4a]
profile=music-mode
[extension.aac]
profile=music-mode
[extension.wav]
profile=music-mode
[extension.wv]
profile=music-mode
[extension.ape]
profile=music-mode
[extension.mka]
profile=music-mode

[music-mode]
# Keep profile settings with hand changes. But only for profile files.
profile-restore=copy-equal
# Limit window size on startup (no larger than this percentage of the screen)
autofit-larger=50%x70%
# infinite playlist
loop-playlist=inf
# No need to save position for music
save-position-on-quit=no
